name: Build Windows Executable

on:
  workflow_dispatch:        # run manually from the Actions tab at any time
  push:
    tags:
      - 'v*'               # or automatically on version tags like v1.0.0

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install

      - name: Install dependencies (including pyinstaller)
        run: uv sync --group dev

      - name: Build executable
        run: uv run pyinstaller kappa.spec --clean

      # GitHub zips the folder automatically when you download the artifact.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kappa-Windows-x64
          path: dist/Kappa/
          if-no-files-found: error
